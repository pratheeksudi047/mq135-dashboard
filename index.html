<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mushroom Farm Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
color:#333;
}

.login-box{
width:320px;
margin:120px auto;
padding:30px;
background:#fff;
border-radius:15px;
text-align:center;
}

.dashboard{
display:none;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin:10px;
width:180px;
text-align:center;
}

.data-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

button{
padding:10px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="login-box" id="loginBox">
<h2>Mushroom Farm Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="error"></p>
</div>


<div class="dashboard" id="dashboard">

<h1 style="text-align:center;color:white;">Farm Environment</h1>

<div class="data-container">

<div class="card">
<h3>Temp Inside</h3>
<p id="temp_in">--</p>
</div>

<div class="card">
<h3>Humidity Inside</h3>
<p id="hum_in">--</p>
</div>

<div class="card">
<h3>Temp Outside</h3>
<p id="temp_out">--</p>
</div>

<div class="card">
<h3>Humidity Outside</h3>
<p id="hum_out">--</p>
</div>

<div class="card">
<h3>Light</h3>
<p id="light">--</p>
</div>

</div>


<div class="card">

<h3>Motor Control</h3>

<button onclick="motorOn()">ON</button>
<button onclick="motorOff()">OFF</button>

</div>


<div class="card">

<h3>Humidity Limits</h3>

<input id="low" placeholder="Low">
<input id="high" placeholder="High">

<button onclick="updateLimits()">Update</button>

</div>

</div>


<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>


<script>

const firebaseConfig = {
apiKey:"APIKEY",
databaseURL:"YOUR_DATABASE"
}

firebase.initializeApp(firebaseConfig)

const auth=firebase.auth()
const db=firebase.database()


function login(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

auth.signInWithEmailAndPassword(email,password)

.catch(e=>{
document.getElementById("error").innerText=e.message
})

}


auth.onAuthStateChanged(user=>{

if(user){

loginBox.style.display="none"
dashboard.style.display="block"

startReading()

}

})


function startReading(){

db.ref("esp32/sensors/temp_inside").on("value",s=>{
temp_in.innerHTML=s.val()
})

db.ref("esp32/sensors/humidity_inside").on("value",s=>{
hum_in.innerHTML=s.val()
})

db.ref("esp32/sensors/temp_outside").on("value",s=>{
temp_out.innerHTML=s.val()
})

db.ref("esp32/sensors/humidity_outside").on("value",s=>{
hum_out.innerHTML=s.val()
})

db.ref("esp32/sensors/light").on("value",s=>{
light.innerHTML=s.val()
})

}


function motorOn(){

db.ref("esp32/control/motor_status").set(1)

}

function motorOff(){

db.ref("esp32/control/motor_status").set(0)

}

function updateLimits(){

let low=document.getElementById("low").value
let high=document.getElementById("high").value

db.ref("esp32/control/humidity_low").set(parseFloat(low))
db.ref("esp32/control/humidity_high").set(parseFloat(high))

}

</script>

</body>
</html>
